<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalCX - 出海客服系统 - Split View</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
        }

        .top-panel {
            height: 50vh;
            width: 100%;
            border-bottom: 3px solid #3B82F6;
            background: #fff;
            position: relative;
        }

        .top-panel iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .preview-label {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(59, 130, 246, 0.9);
            color: white;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            z-index: 10;
        }

        .bottom-panel {
            height: 50vh;
            display: flex;
        }

        .code-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 3px solid #3B82F6;
            min-width: 0;
        }

        .code-label {
            background: #1e1e1e;
            color: #ccc;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 600;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .code-label .file-icon {
            color: #f1fa8c;
        }

        .code-content {
            flex: 1;
            background: #1e1e1e;
            overflow: auto;
            padding: 12px;
        }

        .code-content pre {
            margin: 0;
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #abb2bf;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .code-content .line-number {
            color: #4b5263;
            user-select: none;
            margin-right: 20px;
            display: inline-block;
            width: 40px;
            text-align: right;
        }

        .code-content .highlight {
            background: rgba(59, 130, 246, 0.2);
            display: block;
        }

        .line:hover {
            background: rgba(59, 130, 246, 0.1);
            cursor: pointer;
        }

        .line.active {
            background: rgba(59, 130, 246, 0.3);
        }

        .trae-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .trae-label {
            background: #2d2d2d;
            color: #ccc;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 600;
            border-bottom: 1px solid #333;
        }

        .trae-content {
            flex: 1;
            background: #1e1e1e;
        }

        .trae-content iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .click-hint {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 12px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="top-panel">
        <div class="preview-label">📱 网页预览</div>
        <iframe id="preview-frame" src="index.html"></iframe>
        <div class="click-hint">点击网页元素 → 定位代码</div>
    </div>

    <div class="bottom-panel">
        <div class="code-panel">
            <div class="code-label">
                <span class="file-icon">📄</span>
                <span>index.html</span>
                <span style="margin-left: auto; color: #666; font-weight: 400;">点击行号跳转到 Trae</span>
            </div>
            <div class="code-content" id="code-content"></div>
        </div>

        <div class="trae-panel">
            <div class="trae-label">🤖 Trae Editor</div>
            <div class="trae-content">
                <iframe id="trae-frame" src="index.html"></iframe>
            </div>
        </div>
    </div>

    <script>
        let currentHighlightedLine = null;

        fetch('index.html')
            .then(response => response.text())
            .then(html => {
                const codeContent = document.getElementById('code-content');
                const lines = html.split('\n');
                let lineNumber = 1;

                const pre = document.createElement('pre');

                lines.forEach((line, index) => {
                    const lineSpan = document.createElement('span');
                    lineSpan.className = 'line';
                    lineSpan.dataset.line = lineNumber;
                    lineSpan.dataset.fullLine = line.trim();

                    const lineNumSpan = document.createElement('span');
                    lineNumSpan.className = 'line-number';
                    lineNumSpan.textContent = lineNumber;

                    const lineTextSpan = document.createElement('span');
                    lineTextSpan.textContent = line || ' ';

                    lineSpan.appendChild(lineNumSpan);
                    lineSpan.appendChild(lineTextSpan);
                    lineSpan.appendChild(document.createElement('\n'));

                    lineSpan.addEventListener('click', () => {
                        highlightLine(lineNumber);
                        scrollToTraeLine(lineNumber);
                    });

                    pre.appendChild(lineSpan);
                    lineNumber++;
                });

                codeContent.appendChild(pre);
            })
            .catch(error => {
                document.getElementById('code-content').innerHTML =
                    '<pre style="color: #f44747;">加载代码失败: ' + error.message + '</pre>';
            });

        function highlightLine(lineNum) {
            if (currentHighlightedLine) {
                currentHighlightedLine.classList.remove('active', 'highlight');
            }

            const lineElement = document.querySelector(`.line[data-line="${lineNum}"]`);
            if (lineElement) {
                lineElement.classList.add('active', 'highlight');
                lineElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                currentHighlightedLine = lineElement;
            }
        }

        function scrollToTraeLine(lineNum) {
            const traeFrame = document.getElementById('trae-frame');
            traeFrame.contentWindow.postMessage({
                type: 'gotoLine',
                line: lineNum
            }, '*');
        }

        window.addEventListener('message', function(event) {
            if (event.data.type === 'elementClick') {
                const lineNum = findLineForElement(event.data.element);
                if (lineNum) {
                    highlightLine(lineNum);
                }
            }
        });

        function findLineForElement(selector) {
            const lines = document.querySelectorAll('.line');
            for (let line of lines) {
                const fullLine = line.dataset.fullLine || '';
                if (fullLine.includes(selector) || selector.split('.').some(s => fullLine.includes(s))) {
                    return parseInt(line.dataset.line);
                }
            }
            return null;
        }

        document.getElementById('preview-frame').addEventListener('load', function() {
            const iframeDoc = this.contentDocument || this.contentWindow.document;

            const allElements = iframeDoc.querySelectorAll('*');
            allElements.forEach(el => {
                el.addEventListener('click', function(e) {
                    e.stopPropagation();

                    let selector = '';
                    if (el.id) selector = '#' + el.id;
                    else if (el.className) selector = '.' + el.className.split(' ')[0];
                    else if (el.tagName) selector = el.tagName.toLowerCase();

                    const lineNum = findLineForElement(selector);
                    if (lineNum) {
                        highlightLine(lineNum);
                    }
                });

                el.addEventListener('mouseenter', function() {
                    this.style.outline = '2px solid #3B82F6';
                    this.style.outlineOffset = '2px';
                });

                el.addEventListener('mouseleave', function() {
                    this.style.outline = '';
                    this.style.outlineOffset = '';
                });
            });
        });
    </script>
</body>
</html>
